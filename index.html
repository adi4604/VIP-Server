<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ ZENITSU VIP SERVER ⚡ - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="auth-container">
    <div class="glass-card login-card">
      <h2 class="brand-title text-gradient" style="margin-bottom: 25px;">⚡ ZENITSU VIP ⚡</h2>
      <form id="login-form">
        <div class="input-group">
          <label for="username">ADMIN USERNAME</label>
          <input type="text" id="username" class="input-field" required placeholder="Enter Username">
        </div>
        <div class="input-group">
          <label for="password">PASSWORD</label>
          <input type="password" id="password" class="input-field" required placeholder="Enter Password">
        </div>
        <button type="submit" class="btn-neon">LOGIN TO PANEL</button>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
