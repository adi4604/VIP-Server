<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenitsu & Evil - Authentication</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="glass-box login-card glow-rgb">
      <!-- Badge Header -->
      <div class="auth-badge-wrapper">
        <span class="auth-badge">● GAMER VIP AUTHENTICATION</span>
      </div>

      <!-- Main Title -->
      <div class="login-header">
        <h2 class="title-rgb">💎💥ZENITSU & EVIL🔑💥</h2>
        <p class="sub-title">ADVANCED SCRIPT LICENSING SYSTEM</p>
      </div>

      <!-- Authentication Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="field-label">ADMIN IDENTIFIER</label>
          <input type="text" id="username" class="form-control login-input" placeholder="Enter Username..." value="Zenitsu" required>
        </div>

        <div class="form-group">
          <label class="field-label">SECURITY ACCESS KEY</label>
          <input type="password" id="password" class="form-control login-input" placeholder="••••••••" value="Mands@46" required>
        </div>

        <button type="submit" id="login-btn" class="btn-rgb-glow">
          ⚡ AUTHORIZE ACCESS ⚡
        </button>
      </form>

      <!-- Footer Info -->
      <div class="login-footer">
        <span>PROTECTED BY HWID SHIELD</span>
        <span>v3.0 IST</span>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
