<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZENITSU & EVIL - Licensing System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Particle Canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Centered Login Card Container -->
  <main class="main-container">
    <div class="login-card">
      
      <!-- Top Badge -->
      <div class="badge-container">
        <span class="vip-badge">
          <span class="status-dot"></span> GAMER VIP AUTHENTICATION
        </span>
      </div>

      <!-- Title Header -->
      <header class="card-header">
        <h1 class="glow-title">💎💥 ZENITSU & EVIL 🔑💥</h1>
        <p class="card-subtitle">ADVANCED SCRIPT LICENSING SYSTEM</p>
      </header>

      <!-- Authentication Form -->
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="username">ADMIN IDENTIFIER</label>
          <div class="input-box">
            <input type="text" id="username" placeholder="Zenitsu" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">SECURITY ACCESS KEY</label>
          <div class="input-box">
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="glow-btn">
          ⚡ AUTHORIZE ACCESS ⚡
        </button>
      </form>

      <!-- Footer Info -->
      <footer class="card-footer">
        <span>PROTECTED BY HWID SHIELD</span>
        <span class="version">v3.0 IST</span>
      </footer>

    </div>
  </main>

  <div id="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
