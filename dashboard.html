<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎⚡ ZENITSU & EVIL DASHBOARD 🔑⚡</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="dashboard-wrapper">
    <!-- Header Bar -->
    <header class="top-header glass-box">
      <div class="header-brand">
        <h2 class="title-rgb">💎💥 ZENITSU & EVIL DASHBOARD 🔑💥</h2>
        <p class="sub-text">LUA LOADER & HARDWARE IDENTIFIER MANAGEMENT</p>
      </div>
      <div class="header-right">
        <div class="ist-clock-box">
          <span>🇮🇳 INDIAN STANDARD TIME (IST)</span>
          <div id="ist-time-str">00:00:00 pm</div>
          <div id="ist-date-str">Fri, 24 Jul, 2026</div>
        </div>
        <a href="/api/logout" class="btn-logout">LOGOUT</a>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="glass-box stat-tile">
        <div class="stat-label">📦 Saved Scripts</div>
        <div class="stat-num" id="stat-scripts">0</div>
      </div>
      <div class="glass-box stat-tile">
        <div class="stat-label">🔑 Total Licenses</div>
        <div class="stat-num" id="stat-licenses">0</div>
      </div>
      <div class="glass-box stat-tile">
        <div class="stat-label">🟢 Active VIP Keys</div>
        <div class="stat-num text-green" id="stat-active">0</div>
      </div>
    </div>

    <!-- Main Grid Section -->
    <div class="grid-2col">
      <!-- Generate Key Box -->
      <div class="glass-box section-box">
        <div class="section-title">🔑 Generate VIP Access Key</div>
        <form id="generate-key-form">
          <div class="form-group">
            <label>TARGET SCRIPT PAYLOAD:</label>
            <select id="target-script-select" class="form-control" required>
              <option value="">-- Select Saved Script --</option>
            </select>
          </div>
          <div class="form-group">
            <label>CUSTOM LICENSE KEY (OPTIONAL):</label>
            <input type="text" id="custom-key-input" class="form-control" placeholder="Auto-generate if blank">
          </div>
          <div class="form-group">
            <label>PRE-BIND HWID (OPTIONAL):</label>
            <input type="text" id="prebind-hwid-input" class="form-control" placeholder="e.g. FALLBACK-3B6DDF99...">
          </div>
          <div class="form-group">
            <label>DURATION:</label>
            <select id="duration-select" class="form-control">
              <option value="1">🔥 1 Day</option>
              <option value="7">🔥 7 Days</option>
              <option value="30" selected>🔥 30 Days</option>
              <option value="365">🔥 365 Days</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">⚡ GENERATE LICENSE KEY</button>
        </form>
      </div>

      <!-- Upload Script Box -->
      <div class="glass-box section-box">
        <div class="section-title">📥 Upload & Save New Script</div>
        <form id="upload-script-form">
          <div class="form-group">
            <label>📁 UPLOAD FILE (.LUA / .TXT):</label>
            <input type="file" id="file-uploader" class="form-control" accept=".lua,.txt">
          </div>
          <div class="form-group">
            <label>SCRIPT TITLE / NAME:</label>
            <input type="text" id="script-title-input" class="form-control" placeholder="e.g. MY_SCRIPT.LUA" required>
          </div>
          <div class="form-group">
            <label>LUA CODE CONTENTS:</label>
            <textarea id="script-content-input" class="form-control" rows="4" placeholder="Paste Lua Script Content..." required></textarea>
          </div>
          <button type="submit" class="btn-primary">💾 SAVE SCRIPT PAYLOAD</button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/script.js"></script>
</body>
</html>
